name: Release OpenSunstar

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version read from package.json "packageManager" (pnpm@11.5.2)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release build (signing optional)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/prepare-release-build.mjs

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: OpenSunstar ${{ needs.resolve-tag.outputs.tag }}
          releaseBody: |
            Automated release for OpenSunstar.
            - Platform artifacts are generated by Tauri CI.
            - Includes updater metadata and signatures for desktop updates.
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}

  build-os-cli:
    name: Build os CLI (${{ matrix.artifact_name }})
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: os-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: os-macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: os-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: os-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Create frontend dist placeholder
        run: mkdir -p dist

      - name: Build os CLI (with TUI)
        run: cargo build --release --features tui --bin os --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          NAME="OpenSunstar-${TAG}-${{ matrix.artifact_name }}"
          BIN="src-tauri/target/${{ matrix.target }}/release/os"
          chmod +x "$BIN"
          tar -czf "${NAME}.tar.gz" -C "src-tauri/target/${{ matrix.target }}/release" os
          echo "ARCHIVE=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ needs.resolve-tag.outputs.tag }}"
          $name = "OpenSunstar-${tag}-${{ matrix.artifact_name }}.zip"
          $bin = "src-tauri/target/${{ matrix.target }}/release/os.exe"
          Compress-Archive -Path $bin -DestinationPath $name -Force
          echo "ARCHIVE=$name" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: ${{ env.ARCHIVE }}
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-os-cli-npm:
    name: Publish opensunstar-os to npm
    needs: [resolve-tag, build-os-cli]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync npm package version
        run: node scripts/sync-os-cli-version.mjs

      - name: Publish to npm
        working-directory: packages/os-cli
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not configured — skipping npm publish."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
